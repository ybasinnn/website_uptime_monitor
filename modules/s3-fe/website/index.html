<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Health Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fc; }
        .status-healthy { background-color: #f0fdf4; border-left: 4px solid #16a34a; }
        .status-unhealthy { background-color: #fef2f2; border-left: 4px solid #dc2626; }
        #refresh-bar { transition: width 1s linear; }
    </style>
</head>
<body class="p-4 sm:p-8">
    <div class="max-w-5xl mx-auto bg-white shadow-xl rounded-xl p-6 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gray-100">
            <div id="refresh-bar" class="h-full bg-blue-500" style="width: 0%"></div>
        </div>

        <header class="flex flex-col md:flex-row md:items-center justify-between mb-6 border-b pb-4 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">System Monitoring</h1>
                <p class="text-sm text-gray-500 uppercase tracking-wider font-semibold">Live: SSL • TLS • Latency</p>
            </div>
            <div class="text-left md:text-right">
                <p class="text-xs text-gray-400 font-mono">LAST REFRESHED</p>
                <p id="last-refresh-time" class="text-sm font-bold text-blue-600">--:--:--</p>
            </div>
        </header>

        <div id="status-summary" class="grid grid-cols-1 sm:grid-cols-4 gap-4 mb-8"></div>
        
        <div id="results-container" class="space-y-4"></div>
        
        <div id="loading" class="text-center p-8 text-gray-500">
            <svg class="animate-spin h-5 w-5 mr-3 inline-block text-blue-500" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Polling API...
        </div>

        <div id="error-message" class="hidden mt-4 text-red-700 p-3 bg-red-100 rounded-lg border border-red-300"></div>
    </div>

    <script>
        const API_ENDPOINT = "${api_endpoint}"; 
        let refreshTimer = 0;
        const REFRESH_INTERVAL = 30; // seconds

        function updateRefreshUI() {
            refreshTimer++;
            const percentage = (refreshTimer / REFRESH_INTERVAL) * 100;
            document.getElementById('refresh-bar').style.width = percentage + '%';
            
            if (refreshTimer >= REFRESH_INTERVAL) {
                refreshTimer = 0;
                fetchData();
            }
        }

        function renderSummary(results) {
            const total = results.length;
            const healthyCount = results.filter(r => r.Status.startsWith('Healthy')).length;
            const unhealthyCount = total - healthyCount;
            const uptime = total > 0 ? ((healthyCount / total) * 100).toFixed(1) : 0;

            const summaryHtml = `
                <div class="p-4 rounded-lg shadow-sm bg-white border border-gray-100">
                    <p class="text-xs font-semibold uppercase text-gray-400">Availability</p>
                    <p class="text-2xl font-bold $${uptime >= 99 ? 'text-green-600' : 'text-yellow-600'}">$${uptime}%</p>
                </div>
                <div class="p-4 rounded-lg shadow-sm bg-white border border-gray-100">
                    <p class="text-xs font-semibold uppercase text-gray-400">Healthy</p>
                    <p class="text-2xl font-bold text-green-600">$${healthyCount}</p>
                </div>
                <div class="p-4 rounded-lg shadow-sm bg-white border border-gray-100">
                    <p class="text-xs font-semibold uppercase text-gray-400">Issues</p>
                    <p class="text-2xl font-bold text-red-600">$${unhealthyCount}</p>
                </div>
                <div class="p-4 rounded-lg shadow-sm bg-white border border-gray-100">
                    <p class="text-xs font-semibold uppercase text-gray-400">Total Samples</p>
                    <p class="text-2xl font-bold text-gray-900">$${total}</p>
                </div>
            `;
            document.getElementById('status-summary').innerHTML = summaryHtml;
        }

        function renderResults(results) {
            const container = document.getElementById('results-container');
            container.innerHTML = '';
            
            if (results.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 p-4">Waiting for data signals...</p>';
                return;
            }

            results.forEach(res => {
                const isHealthy = res.Status.startsWith('Healthy');
                const cardClass = isHealthy ? 'status-healthy' : 'status-unhealthy';
                const latency = parseFloat(res.DurationMs);
                
                const html = `
                    <div class="p-4 rounded-lg shadow-sm border border-gray-100 grid grid-cols-1 md:grid-cols-4 gap-4 items-center $${cardClass}">
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase leading-none mb-1">$${new Date(res.Timestamp).toLocaleTimeString()}</p>
                            <p class="text-sm font-mono truncate text-gray-700 font-semibold">$${res.URL}</p>
                        </div>
                        
                        <div class="text-xs text-gray-500">
                            <p class="mb-1"><span class="text-gray-400 font-medium">PROTO:</span> $${res.TLS}</p>
                            <p><span class="text-gray-400 font-medium">SSL:</span> <span class="$${res.SSLDays < 14 ? 'text-red-500 font-bold' : 'text-gray-700'}">$${res.SSLDays} days left</span></p>
                        </div>

                        <div class="text-xs text-gray-500">
                            <p class="mb-1"><span class="text-gray-400 font-medium">HOP:</span> $${res.Redirect}</p>
                            <p><span class="text-gray-400 font-medium">LATENCY:</span> <span class="text-gray-700 font-bold">$${!isNaN(latency) ? latency.toFixed(0) + 'ms' : 'N/A'}</span></p>
                        </div>

                        <div class="text-right">
                            <span class="px-2 py-1 text-[10px] font-black rounded border $${isHealthy ? 'bg-green-50 text-green-700 border-green-200' : 'bg-red-50 text-red-700 border-red-200'}">
                                HTTP $${res.HTTPStatusCode} • $${isHealthy ? 'UP' : 'DOWN'}
                            </span>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        async function fetchData() {
            try {
                const response = await fetch(API_ENDPOINT);
                if (!response.ok) throw new Error('Network response error');
                
                const data = await response.json();
                renderSummary(data);
                renderResults(data);
                
                document.getElementById('last-refresh-time').innerText = new Date().toLocaleTimeString();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error-message').classList.add('hidden');
                refreshTimer = 0; // Reset countdown after successful manual or auto fetch
            } catch (error) {
                console.error("Dashboard error:", error);
                document.getElementById('error-message').innerText = 'Connection Failed: ' + error.message;
                document.getElementById('error-message').classList.remove('hidden');
            }
        }

        window.onload = () => {
            fetchData();
            // Core refresh logic: 1s increment for UI bar, triggers fetch at 30s
            setInterval(updateRefreshUI, 1000);
        };
    </script>
</body>
</html>
